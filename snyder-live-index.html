  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const{useState,useEffect,useCallback,useRef}=React;
const SUPABASE_URL='https://qggylmfyrnlwnkhjldjl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnZ3lsbWZ5cm5sd25raGpsZGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTU5ODQsImV4cCI6MjA5MjE3MTk4NH0.StHB-C5UZfxpBTWSmKvGWMGPp0q9O35XGcKtKed4cnw';
const ADMIN_PW='admin2025';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── Styles ──────────────────────────────────────────────────────────
const S={
  pri:{fontFamily:'Georgia,serif',cursor:'pointer',borderRadius:10,fontSize:14,padding:'10px 20px',border:'1px solid #3b6fd4',background:'#1a3a8a',color:'#e8f0ff'},
  gho:{fontFamily:'Georgia,serif',cursor:'pointer',borderRadius:10,fontSize:14,padding:'8px 16px',border:'1px solid #1e3a5a',background:'rgba(255,255,255,0.05)',color:'#7aa0d4'},
  dan:{fontFamily:'Georgia,serif',cursor:'pointer',borderRadius:10,fontSize:14,padding:'8px 16px',border:'1px solid #5a2020',background:'rgba(239,68,68,0.15)',color:'#f87171'},
  inp:{width:'100%',background:'rgba(255,255,255,0.07)',border:'1px solid #1e3a5a',borderRadius:8,color:'#e8f0ff',padding:'10px 12px',fontSize:14,fontFamily:'Georgia,serif',outline:'none'},
  lbl:{fontSize:12,color:'#4a7aa8',letterSpacing:'0.08em',textTransform:'uppercase',display:'block',marginBottom:6},
  card:{background:'rgba(255,255,255,0.04)',border:'1px solid #1a3050',borderRadius:12,padding:'16px'},
};

// ── Stableford Calculator ────────────────────────────────────────────
function calcStableford(grossScore, par, strokeIndex, handicap){
  if(grossScore===0||grossScore===null||grossScore===undefined)return 0;
  const shots=Math.floor(handicap/18)+((handicap%18)>=strokeIndex?1:0);
  const netScore=grossScore-shots;
  const diff=par-netScore;
  return Math.max(0,diff+2);
}

// ── Confirm Modal ────────────────────────────────────────────────────
function ConfirmModal({cm,setCm}){
  if(!cm)return null;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
      <div style={{background:'#0d1f3c',border:'1px solid #1e3a5a',borderRadius:14,padding:24,maxWidth:340,width:'100%'}}>
        <div style={{fontSize:17,color:'#e8f0ff',marginBottom:8}}>{cm.title}</div>
        <div style={{fontSize:13,color:'#4a7aa8',marginBottom:20,lineHeight:1.5}}>{cm.body}</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>{cm.onConfirm();setCm(null);}} style={{...S.pri,flex:1}}>{cm.action||'Confirm'}</button>
          <button onClick={()=>setCm(null)} style={{...S.gho,flex:1}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Toast ────────────────────────────────────────────────────────────
function Toast({toast}){
  if(!toast)return null;
  return(
    <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:toast.type==='error'?'#7f1d1d':'#1a3a8a',border:`1px solid ${toast.type==='error'?'#ef4444':'#3b6fd4'}`,color:'#e8f0ff',padding:'10px 20px',borderRadius:10,fontSize:13,zIndex:2000,whiteSpace:'nowrap',maxWidth:'90vw',overflow:'hidden',textOverflow:'ellipsis'}}>
      {toast.msg}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState('home');
  const[isAdmin,setIsAdmin]=useState(false);
  const[showLogin,setShowLogin]=useState(false);
  const[pw,setPw]=useState('');
  const[toast,setToast]=useState(null);
  const[cm,setCm]=useState(null);
  const[loading,setLoading]=useState(true);

  // Data
  const[competitions,setCompetitions]=useState([]);
  const[activeComp,setActiveComp]=useState(null);
  const[players,setPlayers]=useState([]);
  const[courses,setCourses]=useState([]);
  const[rounds,setRounds]=useState([]);
  const[groups,setGroups]=useState([]);
  const[scores,setScores]=useState([]);
  const[selectedComp,setSelectedComp]=useState(null);
  const[selectedRound,setSelectedRound]=useState(null);

  function flash(msg,type='ok'){
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  }

  async function load(){
    setLoading(true);
    const[{data:comps},{data:plys},{data:crs},{data:rds},{data:grps},{data:scs}]=await Promise.all([
      sb.from('cup_competitions').select('*').order('created_at',{ascending:false}),
      sb.from('cup_players').select('*').order('name'),
      sb.from('cup_courses').select('*').order('name'),
      sb.from('cup_rounds').select('*').order('day_number'),
      sb.from('cup_groups').select('*'),
      sb.from('cup_scores').select('*'),
    ]);
    setCompetitions(comps||[]);
    setPlayers(plys||[]);
    setCourses(crs||[]);
    setRounds(rds||[]);
    setGroups(grps||[]);
    setScores(scs||[]);
    // Set active comp
    const active=(comps||[]).find(c=>c.status==='active')||(comps||[])[0]||null;
    setActiveComp(active);
    if(!selectedComp&&active)setSelectedComp(active);
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  // Auto-refresh every 30s for live scoring
  useEffect(()=>{
    const t=setInterval(()=>{
      if(view==='live'||view==='leaderboard')load();
    },30000);
    return()=>clearInterval(t);
  },[view]);

  function login(){
    if(pw===ADMIN_PW){setIsAdmin(true);setShowLogin(false);setPw('');flash('Admin access granted');}
    else{flash('Wrong password','error');}
  }

  // ── HOME ──────────────────────────────────────────────────────────
  if(view==='home') return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'40px 20px'}}>
      <div style={{width:'100%',maxWidth:480}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:40}}>
          <div style={{fontSize:11,color:'#2a4a7a'}}>⛳ SNYDER LIVE</div>
          <button onClick={()=>isAdmin?setIsAdmin(false):setShowLogin(true)} style={{...S.gho,fontSize:12,padding:'6px 12px'}}>
            {isAdmin?'🔐 Admin':'🔒 Admin'}
          </button>
        </div>

        {/* Logo placeholder */}
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:48,marginBottom:8}}>⛳</div>
          <div style={{fontSize:32,color:'#e8f0ff',letterSpacing:'0.05em'}}>SNYDER LIVE</div>
          <div style={{fontSize:13,color:'#2a4a7a',marginTop:4,letterSpacing:'0.15em',textTransform:'uppercase'}}>Live Golf Scoring</div>
        </div>

        {/* Active competition */}
        {activeComp&&(
          <div style={{...S.card,marginBottom:16,borderColor:'rgba(59,111,212,0.4)',background:'rgba(59,111,212,0.08)',cursor:'pointer'}} onClick={()=>{setSelectedComp(activeComp);setView('competition');}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:11,color:'#3b6fd4',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:4}}>
                  {activeComp.status==='active'?<><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#ef4444',marginRight:6,animation:'livepulse 2s infinite'}}/>LIVE NOW</>:'Latest'}
                </div>
                <div style={{fontSize:18,color:'#e8f0ff'}}>{activeComp.name}</div>
                <div style={{fontSize:12,color:'#4a7aa8',marginTop:2}}>{activeComp.venue||'Venue TBC'} · {activeComp.num_days} days</div>
              </div>
              <div style={{fontSize:24}}>🏆</div>
            </div>
          </div>
        )}

        {/* Main nav buttons */}
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
          <button onClick={()=>setView('leaderboard')} style={{...S.pri,width:'100%',padding:'14px',fontSize:15}}>🏆 Leaderboard</button>
          <button onClick={()=>setView('live')} style={{...S.pri,width:'100%',padding:'14px',fontSize:15,background:'rgba(239,68,68,0.2)',borderColor:'rgba(239,68,68,0.5)',color:'#fca5a5'}}>
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#ef4444',marginRight:8,animation:'livepulse 2s infinite'}}/>
            Live Scoring
          </button>
          <button onClick={()=>setView('competitions')} style={{...S.gho,width:'100%',padding:'12px',fontSize:14}}>📋 Competitions</button>
          <button onClick={()=>setView('players')} style={{...S.gho,width:'100%',padding:'12px',fontSize:14}}>👤 Players</button>
          {isAdmin&&<button onClick={()=>setView('admin')} style={{...S.gho,width:'100%',padding:'12px',fontSize:14,color:'#fbbf24',borderColor:'rgba(251,191,36,0.3)'}}>🔐 Admin Panel</button>}
        </div>
      </div>

      {/* Login modal */}
      {showLogin&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:20}}>
          <div style={{background:'#0d1f3c',border:'1px solid #1e3a5a',borderRadius:14,padding:24,width:'100%',maxWidth:320}}>
            <div style={{fontSize:16,color:'#e8f0ff',marginBottom:16}}>Admin Login</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Password" style={{...S.inp,marginBottom:12}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={login} style={{...S.pri,flex:1}}>Login</button>
              <button onClick={()=>{setShowLogin(false);setPw('');}} style={{...S.gho,flex:1}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      <Toast toast={toast}/>
      <ConfirmModal cm={cm} setCm={setCm}/>
    </div>
  );

  // ── COMPETITIONS LIST ─────────────────────────────────────────────
  if(view==='competitions') return(
    <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
        <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
        <div style={{fontSize:18,color:'#e8f0ff'}}>Competitions</div>
      </div>
      {loading?<div style={{textAlign:'center',color:'#2a4a7a',padding:40}}>Loading…</div>:competitions.length===0?(
        <div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:40}}>No competitions yet</div>
      ):competitions.map(comp=>(
        <div key={comp.id} style={{...S.card,marginBottom:10,cursor:'pointer',borderColor:comp.status==='active'?'rgba(59,111,212,0.4)':'#1a3050'}} onClick={()=>{setSelectedComp(comp);setView('competition');}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:16,color:'#e8f0ff',marginBottom:2}}>{comp.name}</div>
              <div style={{fontSize:12,color:'#4a7aa8'}}>{comp.venue||'Venue TBC'} · {comp.num_days} days</div>
            </div>
            <div style={{fontSize:11,padding:'3px 8px',borderRadius:20,background:comp.status==='active'?'rgba(59,111,212,0.2)':comp.status==='completed'?'rgba(74,180,90,0.15)':'rgba(255,255,255,0.05)',color:comp.status==='active'?'#7aa8f0':comp.status==='completed'?'#86efac':'#4a7aa8',border:`1px solid ${comp.status==='active'?'rgba(59,111,212,0.3)':comp.status==='completed'?'rgba(74,180,90,0.3)':'#1e3a5a'}`}}>
              {comp.status==='active'?'LIVE':comp.status==='completed'?'Completed':'Setup'}
            </div>
          </div>
        </div>
      ))}
      <Toast toast={toast}/>
    </div>
  );

  // ── COMPETITION DETAIL ────────────────────────────────────────────
  if(view==='competition'&&selectedComp){
    const compRounds=rounds.filter(r=>r.competition_id===selectedComp.id).sort((a,b)=>a.day_number-b.day_number);
    const compPlayers=players.filter(p=>p.competition_id===selectedComp.id||selectedComp.player_ids?.includes(p.id));
    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setView('competitions')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:18,color:'#e8f0ff'}}>{selectedComp.name}</div>
        </div>
        <div style={{...S.card,marginBottom:16}}>
          <div style={{fontSize:13,color:'#4a7aa8',marginBottom:4}}>{selectedComp.venue||'Venue TBC'}</div>
          <div style={{display:'flex',gap:16,fontSize:12,color:'#2a4a7a'}}>
            <span>🏌️ {selectedComp.num_days} days</span>
            <span>👤 {selectedComp.num_players||8} players</span>
            <span>🏆 {selectedComp.format||'Stableford'}</span>
          </div>
        </div>
        <div style={{fontSize:11,letterSpacing:'0.12em',color:'#3b6fd4',textTransform:'uppercase',marginBottom:10}}>Rounds</div>
        {compRounds.length===0?<div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:30,marginBottom:16}}>No rounds set up yet</div>:compRounds.map(rd=>(
          <div key={rd.id} style={{...S.card,marginBottom:8,cursor:'pointer'}} onClick={()=>{setSelectedRound(rd);setView('round');}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:15,color:'#e8f0ff'}}>Day {rd.day_number} — {rd.name||'Round'}</div>
                <div style={{fontSize:12,color:'#4a7aa8',marginTop:2}}>{rd.course_name||'Course TBC'}</div>
              </div>
              <div style={{fontSize:11,padding:'3px 8px',borderRadius:20,background:rd.status==='live'?'rgba(239,68,68,0.15)':rd.status==='completed'?'rgba(74,180,90,0.15)':'rgba(255,255,255,0.04)',color:rd.status==='live'?'#fca5a5':rd.status==='completed'?'#86efac':'#4a7aa8',border:`1px solid ${rd.status==='live'?'rgba(239,68,68,0.3)':rd.status==='completed'?'rgba(74,180,90,0.3)':'#1e3a5a'}`}}>
                {rd.status==='live'?'🔴 LIVE':rd.status==='completed'?'Done':'Upcoming'}
              </div>
            </div>
          </div>
        ))}
        <div style={{marginTop:16}}>
          <button onClick={()=>setView('leaderboard')} style={{...S.pri,width:'100%',marginBottom:8}}>🏆 View Leaderboard</button>
          <button onClick={()=>setView('live')} style={{...S.gho,width:'100%'}}>🔴 Live Scoring</button>
        </div>
        <Toast toast={toast}/>
      </div>
    );
  }

  // ── LEADERBOARD ───────────────────────────────────────────────────
  if(view==='leaderboard'){
    const comp=selectedComp||activeComp;
    if(!comp)return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:18,color:'#e8f0ff'}}>Leaderboard</div>
        </div>
        <div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:40}}>No active competition</div>
        <Toast toast={toast}/>
      </div>
    );
    const compRounds=rounds.filter(r=>r.competition_id===comp.id);
    const compScores=scores.filter(s=>compRounds.some(r=>r.id===s.round_id));

    // Individual stableford leaderboard
    const playerTotals=players.map(p=>{
      const pScores=compScores.filter(s=>s.player_id===p.id);
      const total=pScores.reduce((t,s)=>t+(s.stableford_points||0),0);
      const byRound={};
      compRounds.forEach(r=>{
        const rs=pScores.filter(s=>s.round_id===r.id);
        byRound[r.id]=rs.reduce((t,s)=>t+(s.stableford_points||0),0);
      });
      return{...p,total,byRound};
    }).filter(p=>p.total>0).sort((a,b)=>b.total-a.total);

    // Team scores
    const teamLIV=players.filter(p=>p.team==='LIV');
    const teamBoring=players.filter(p=>p.team==='Boring');

    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
            <div style={{fontSize:18,color:'#e8f0ff'}}>Leaderboard</div>
          </div>
          <button onClick={load} style={{...S.gho,padding:'6px 10px',fontSize:12}}>↺</button>
        </div>
        <div style={{fontSize:14,color:'#7aa8f0',marginBottom:16}}>{comp.name}</div>

        {/* Ryder Cup Style Team Score */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 60px 1fr',gap:8,marginBottom:20,background:'rgba(255,255,255,0.03)',border:'1px solid #1a3050',borderRadius:12,padding:'14px 16px',alignItems:'center'}}>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'#4a7aa8',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:4}}>Team LIV</div>
            <div style={{fontSize:36,color:'#7aa8f0',lineHeight:1}}>{comp.team_liv_points||0}</div>
            <div style={{fontSize:10,color:'#2a4a7a'}}>points</div>
          </div>
          <div style={{textAlign:'center',fontSize:13,color:'#2a4a7a'}}>vs</div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'#4a7aa8',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:4}}>Team Boring</div>
            <div style={{fontSize:36,color:'#7aa8f0',lineHeight:1}}>{comp.team_boring_points||0}</div>
            <div style={{fontSize:10,color:'#2a4a7a'}}>points</div>
          </div>
        </div>

        {/* Individual leaderboard */}
        <div style={{fontSize:11,letterSpacing:'0.12em',color:'#3b6fd4',textTransform:'uppercase',marginBottom:10}}>Individual Stableford</div>
        {playerTotals.length===0?(
          <div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:30}}>No scores yet</div>
        ):(
          <div style={{border:'1px solid #1a3050',borderRadius:12,overflow:'hidden'}}>
            <div style={{background:'rgba(59,111,212,0.08)',borderBottom:'1px solid #1a3050',padding:'8px 14px',display:'grid',gridTemplateColumns:'36px 1fr 50px 60px',gap:6}}>
              <div style={{fontSize:9,color:'#3b6fd4',textTransform:'uppercase'}}>Pos</div>
              <div style={{fontSize:9,color:'#3b6fd4',textTransform:'uppercase'}}>Player</div>
              <div style={{fontSize:9,color:'#3b6fd4',textTransform:'uppercase',textAlign:'center'}}>HCP</div>
              <div style={{fontSize:9,color:'#3b6fd4',textTransform:'uppercase',textAlign:'right'}}>Pts</div>
            </div>
            {playerTotals.map((p,i)=>(
              <div key={p.id} style={{display:'grid',gridTemplateColumns:'36px 1fr 50px 60px',padding:'12px 14px',gap:6,alignItems:'center',background:i%2===0?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.1)',borderBottom:i<playerTotals.length-1?'1px solid #0d1a2e':'none'}}>
                <div style={{fontSize:14,color:i===0?'#fbbf24':i===1?'#9ca3af':i===2?'#b45309':'#3b6fd4',textAlign:'center'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                <div>
                  <div style={{fontSize:14,color:'#e8f0ff'}}>{p.name}</div>
                  <div style={{fontSize:10,color:p.team==='LIV'?'#7aa8f0':'#4a7aa8'}}>{p.team==='LIV'?'Team LIV':'Team Boring'}</div>
                </div>
                <div style={{textAlign:'center',fontSize:13,color:'#4a7aa8'}}>{p.current_handicap||p.handicap||0}</div>
                <div style={{textAlign:'right',fontSize:20,color:i===0?'#fbbf24':'#e8f0ff'}}>{p.total}</div>
              </div>
            ))}
          </div>
        )}
        <Toast toast={toast}/>
      </div>
    );
  }

  // ── LIVE SCORING ──────────────────────────────────────────────────
  if(view==='live'){
    const comp=selectedComp||activeComp;
    const liveRounds=rounds.filter(r=>r.competition_id===comp?.id&&r.status==='live');

    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:18,color:'#e8f0ff'}}>
            <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#ef4444',marginRight:8,animation:'livepulse 2s infinite'}}/>
            Live Scoring
          </div>
        </div>
        {!comp?<div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:40}}>No active competition</div>:liveRounds.length===0?(
          <div style={{...S.card,textAlign:'center',padding:40}}>
            <div style={{fontSize:16,color:'#e8f0ff',marginBottom:8}}>No live rounds right now</div>
            <div style={{fontSize:13,color:'#2a4a7a'}}>Admin needs to set a round to Live to enable scoring</div>
          </div>
        ):liveRounds.map(rd=>{
          const rdGroups=groups.filter(g=>g.round_id===rd.id);
          return(
            <div key={rd.id} style={{marginBottom:20}}>
              <div style={{fontSize:14,color:'#7aa8f0',marginBottom:10}}>Day {rd.day_number} — {rd.name||'Round'}</div>
              {rdGroups.length===0?<div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:20}}>No groups set up for this round</div>:rdGroups.map(grp=>(
                <div key={grp.id} style={{...S.card,marginBottom:10,cursor:'pointer',borderColor:'rgba(239,68,68,0.25)'}} onClick={()=>{setSelectedRound({...rd,groupId:grp.id});setView('scorecard');}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:15,color:'#e8f0ff'}}>Group {grp.group_number}</div>
                      <div style={{fontSize:12,color:'#4a7aa8',marginTop:2}}>{(grp.player_ids||[]).length} players · Tap to score</div>
                    </div>
                    <div style={{fontSize:20}}>📋</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
        <Toast toast={toast}/>
      </div>
    );
  }

  // ── SCORECARD ─────────────────────────────────────────────────────
  if(view==='scorecard'&&selectedRound){
    const rd=rounds.find(r=>r.id===selectedRound.id)||selectedRound;
    const grp=groups.find(g=>g.id===selectedRound.groupId);
    const course=courses.find(c=>c.id===rd.course_id);
    const grpPlayerIds=grp?.player_ids||[];
    const grpPlayers=players.filter(p=>grpPlayerIds.includes(p.id));
    const[currentHole,setCurrentHole]=useState(1);
    const[holeScores,setHoleScores]=useState({});
    const[saving,setSaving]=useState(false);

    // Load existing scores
    useEffect(()=>{
      const existing={};
      scores.filter(s=>s.round_id===rd.id&&grpPlayerIds.includes(s.player_id)).forEach(s=>{
        if(!existing[s.hole_number])existing[s.hole_number]={};
        existing[s.hole_number][s.player_id]=s.gross_score;
      });
      setHoleScores(existing);
    },[scores]);

    const holes=course?.holes||Array.from({length:18},(_,i)=>({hole:i+1,par:4,stroke_index:i+1}));
    const holeData=holes.find(h=>h.hole===currentHole)||{hole:currentHole,par:4,stroke_index:currentHole};

    async function saveHole(){
      setSaving(true);
      const holeEntry=holeScores[currentHole]||{};
      for(const player of grpPlayers){
        const gross=holeEntry[player.id];
        if(!gross||gross===0)continue;
        const pts=calcStableford(gross,holeData.par,holeData.stroke_index,player.current_handicap||player.handicap||0);
        // Upsert score
        await sb.from('cup_scores').upsert({
          round_id:rd.id,
          player_id:player.id,
          hole_number:currentHole,
          gross_score:gross,
          stableford_points:pts,
          par:holeData.par,
          stroke_index:holeData.stroke_index,
        },{onConflict:'round_id,player_id,hole_number'});
      }
      setSaving(false);
      flash(`Hole ${currentHole} saved ✓`);
      if(currentHole<18)setCurrentHole(h=>h+1);
      load();
    }

    function setScore(playerId,val){
      setHoleScores(prev=>({...prev,[currentHole]:{...(prev[currentHole]||{}),[playerId]:parseInt(val)||0}}));
    }

    const holesPlayed=Object.keys(holeScores).filter(h=>Object.keys(holeScores[h]||{}).length>0).length;

    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <button onClick={()=>setView('live')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:16,color:'#e8f0ff'}}>Group {grp?.group_number} — Scorecard</div>
        </div>

        {/* Hole selector */}
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:16}}>
          {Array.from({length:18},(_,i)=>i+1).map(h=>{
            const done=holeScores[h]&&Object.keys(holeScores[h]).length>0;
            return(
              <button key={h} onClick={()=>setCurrentHole(h)} style={{width:36,height:36,borderRadius:6,border:`1px solid ${h===currentHole?'#3b6fd4':done?'rgba(74,180,90,0.4)':'#1a3050'}`,background:h===currentHole?'#1a3a8a':done?'rgba(74,180,90,0.15)':'rgba(255,255,255,0.03)',color:h===currentHole?'#fff':done?'#86efac':'#4a7aa8',fontSize:12,cursor:'pointer',fontFamily:'Georgia,serif'}}>
                {h}
              </button>
            );
          })}
        </div>

        {/* Current hole info */}
        <div style={{...S.card,marginBottom:16,background:'rgba(59,111,212,0.08)',borderColor:'rgba(59,111,212,0.3)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:22,color:'#e8f0ff'}}>Hole {currentHole}</div>
            <div style={{display:'flex',gap:16,fontSize:13,color:'#7aa8f0'}}>
              <span>Par {holeData.par}</span>
              <span>SI {holeData.stroke_index}</span>
            </div>
          </div>
        </div>

        {/* Score entry */}
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
          {grpPlayers.map(player=>{
            const gross=(holeScores[currentHole]||{})[player.id]||'';
            const pts=gross?calcStableford(parseInt(gross),holeData.par,holeData.stroke_index,player.current_handicap||player.handicap||0):null;
            return(
              <div key={player.id} style={{...S.card,display:'flex',alignItems:'center',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,color:'#e8f0ff'}}>{player.name}</div>
                  <div style={{fontSize:11,color:'#4a7aa8'}}>HCP {player.current_handicap||player.handicap||0} · {player.team}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <button onClick={()=>setScore(player.id,Math.max(1,(parseInt(gross)||0)-1))} style={{width:32,height:32,borderRadius:6,border:'1px solid #1e3a5a',background:'rgba(255,255,255,0.05)',color:'#e8f0ff',cursor:'pointer',fontSize:18,fontFamily:'Georgia,serif'}}>−</button>
                  <input type="number" min="1" max="12" value={gross} onChange={e=>setScore(player.id,e.target.value)} style={{...S.inp,width:52,textAlign:'center',padding:'6px'}}/>
                  <button onClick={()=>setScore(player.id,(parseInt(gross)||0)+1)} style={{width:32,height:32,borderRadius:6,border:'1px solid #1e3a5a',background:'rgba(255,255,255,0.05)',color:'#e8f0ff',cursor:'pointer',fontSize:18,fontFamily:'Georgia,serif'}}>+</button>
                  {pts!==null&&<div style={{minWidth:28,textAlign:'center'}}>
                    <div style={{fontSize:16,color:pts>=3?'#86efac':pts===2?'#7aa8f0':pts===1?'#4a7aa8':'#f87171',fontWeight:'normal'}}>{pts}</div>
                    <div style={{fontSize:9,color:'#2a4a7a'}}>pts</div>
                  </div>}
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={saveHole} disabled={saving} style={{...S.pri,width:'100%',padding:'14px',fontSize:15,opacity:saving?0.7:1}}>
          {saving?'Saving…':`Save Hole ${currentHole}${currentHole<18?' → Next Hole':' — Finish'}`}
        </button>

        {/* Running totals */}
        {holesPlayed>0&&(
          <div style={{...S.card,marginTop:16}}>
            <div style={{fontSize:11,color:'#3b6fd4',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10}}>Running Total</div>
            {grpPlayers.map(p=>{
              const total=Object.values(holeScores).reduce((t,h)=>{
                const g=h[p.id];
                return t+(g?calcStableford(g,4,1,p.current_handicap||p.handicap||0):0);
              },0);
              return(
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #0d1a2e'}}>
                  <span style={{fontSize:13,color:'#c8d8f0'}}>{p.name}</span>
                  <span style={{fontSize:15,color:'#7aa8f0'}}>{total} pts</span>
                </div>
              );
            })}
          </div>
        )}

        <Toast toast={toast}/>
      </div>
    );
  }

  // ── PLAYERS ───────────────────────────────────────────────────────
  if(view==='players'){
    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:18,color:'#e8f0ff'}}>Players</div>
        </div>
        {players.length===0?<div style={{...S.card,textAlign:'center',color:'#2a4a7a',padding:40}}>No players yet — admin can add them</div>:(
          <div style={{border:'1px solid #1a3050',borderRadius:12,overflow:'hidden'}}>
            {players.map((p,i)=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:i<players.length-1?'1px solid #0d1a2e':'none',background:i%2===0?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.1)'}}>
                <div>
                  <div style={{fontSize:15,color:'#e8f0ff'}}>{p.name}</div>
                  <div style={{fontSize:11,color:p.team==='LIV'?'#7aa8f0':'#4a7aa8'}}>{p.team==='LIV'?'⚡ Team LIV':'😴 Team Boring'}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:16,color:'#7aa8f0'}}>{p.current_handicap||p.handicap||0}</div>
                  <div style={{fontSize:10,color:'#2a4a7a'}}>handicap</div>
                </div>
              </div>
            ))}
          </div>
        )}
        <Toast toast={toast}/>
      </div>
    );
  }

  // ── ADMIN PANEL ───────────────────────────────────────────────────
  if(view==='admin'&&isAdmin){
    return <AdminPanel players={players} competitions={competitions} courses={courses} rounds={rounds} groups={groups} scores={scores} load={load} flash={flash} setCm={setCm} cm={cm} setView={setView} S={S} sb={sb}/>;
  }
  if(view==='admin'&&!isAdmin){
    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto',textAlign:'center',paddingTop:80}}>
        <div style={{fontSize:16,color:'#4a7aa8',marginBottom:16}}>Admin access required</div>
        <button onClick={()=>setShowLogin(true)} style={S.pri}>Log In</button>
        <Toast toast={toast}/>
      </div>
    );
  }

  return <div style={{padding:40,color:'#4a7aa8',textAlign:'center'}}>Loading…</div>;
}

// ── ADMIN PANEL COMPONENT ─────────────────────────────────────────
function AdminPanel({players,competitions,courses,rounds,groups,scores,load,flash,setCm,cm,setView,S,sb}){
  const[tab,setTab]=useState('competitions');
  const[newPlayer,setNewPlayer]=useState({name:'',handicap:'',team:'LIV'});
  const[newComp,setNewComp]=useState({name:'',venue:'',num_days:3,num_players:8});
  const[newCourse,setNewCourse]=useState({name:'',holes:[]});
  const[editHcp,setEditHcp]=useState({});
  const[addingPlayer,setAddingPlayer]=useState(false);
  const[addingComp,setAddingComp]=useState(false);
  const[addingCourse,setAddingCourse]=useState(false);
  const[setupRound,setSetupRound]=useState(null);
  const[roundPairings,setRoundPairings]=useState({});

  async function addPlayer(){
    if(!newPlayer.name){flash('Enter a name','error');return;}
    await sb.from('cup_players').insert({name:newPlayer.name,handicap:parseInt(newPlayer.handicap)||0,current_handicap:parseInt(newPlayer.handicap)||0,team:newPlayer.team});
    setNewPlayer({name:'',handicap:'',team:'LIV'});setAddingPlayer(false);load();flash('Player added ✓');
  }

  async function addComp(){
    if(!newComp.name){flash('Enter a name','error');return;}
    await sb.from('cup_competitions').insert({...newComp,status:'setup',team_liv_points:0,team_boring_points:0});
    setNewComp({name:'',venue:'',num_days:3,num_players:8});setAddingComp(false);load();flash('Competition created ✓');
  }

  async function deletePlayer(id){
    await sb.from('cup_players').delete().eq('id',id);load();flash('Player removed');setCm(null);
  }

  async function updateHandicap(playerId,hcp){
    await sb.from('cup_players').update({current_handicap:parseInt(hcp)||0}).eq('id',playerId);
    setEditHcp(prev=>({...prev,[playerId]:undefined}));load();flash('Handicap updated ✓');
  }

  async function setCompStatus(id,status){
    await sb.from('cup_competitions').update({status}).eq('id',id);load();flash(`Competition ${status} ✓`);
  }

  async function addRound(compId,dayNum){
    const comp=competitions.find(c=>c.id===compId);
    const course=courses[0];
    await sb.from('cup_rounds').insert({competition_id:compId,day_number:dayNum,name:`Day ${dayNum}`,course_id:course?.id||null,course_name:course?.name||'TBC',status:'upcoming'});
    load();flash(`Day ${dayNum} round added ✓`);
  }

  async function setRoundStatus(id,status){
    await sb.from('cup_rounds').update({status}).eq('id',id);load();flash(`Round ${status} ✓`);
  }

  async function setupGroups(round){
    setSetupRound(round);
    // Load existing groups for this round
    const existing={};
    groups.filter(g=>g.round_id===round.id).forEach(g=>{
      existing[g.group_number]=g.player_ids||[];
    });
    setRoundPairings(existing);
  }

  async function saveGroups(roundId){
    // Delete existing groups
    await sb.from('cup_groups').delete().eq('round_id',roundId);
    // Insert new ones
    for(const[gNum,pIds] of Object.entries(roundPairings)){
      if(pIds.length>0){
        await sb.from('cup_groups').insert({round_id:roundId,group_number:parseInt(gNum),player_ids:pIds});
      }
    }
    setSetupRound(null);load();flash('Groups saved ✓');
  }

  async function addCourse(){
    if(!newCourse.name){flash('Enter course name','error');return;}
    // Create 18 default holes
    const holes=Array.from({length:18},(_,i)=>({hole:i+1,par:4,stroke_index:i+1}));
    await sb.from('cup_courses').insert({name:newCourse.name,holes});
    setNewCourse({name:'',holes:[]});setAddingCourse(false);load();flash('Course added — edit holes in the Courses tab ✓');
  }

  // Setup groups modal
  if(setupRound){
    const roundPlayers=players;
    return(
      <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
          <button onClick={()=>setSetupRound(null)} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Back</button>
          <div style={{fontSize:16,color:'#e8f0ff'}}>Setup Groups — Day {setupRound.day_number}</div>
        </div>
        {[1,2,3].map(gNum=>(
          <div key={gNum} style={{...S.card,marginBottom:12}}>
            <div style={{fontSize:14,color:'#7aa8f0',marginBottom:10}}>Group {gNum}</div>
            {roundPlayers.map(p=>{
              const inGroup=(roundPairings[gNum]||[]).includes(p.id);
              const inOtherGroup=Object.entries(roundPairings).some(([g,ids])=>parseInt(g)!==gNum&&ids.includes(p.id));
              return(
                <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #0d1a2e'}}>
                  <div>
                    <span style={{fontSize:14,color:inOtherGroup?'#2a4a7a':'#e8f0ff'}}>{p.name}</span>
                    <span style={{fontSize:11,color:'#3b6fd4',marginLeft:8}}>{p.team}</span>
                  </div>
                  <button
                    onClick={()=>{
                      if(inGroup){setRoundPairings(prev=>({...prev,[gNum]:(prev[gNum]||[]).filter(id=>id!==p.id)}));}
                      else if(!inOtherGroup){setRoundPairings(prev=>({...prev,[gNum]:[...(prev[gNum]||[]),p.id]}));}
                    }}
                    style={{...S.gho,padding:'4px 10px',fontSize:12,background:inGroup?'rgba(59,111,212,0.2)':'rgba(255,255,255,0.04)',borderColor:inGroup?'#3b6fd4':'#1e3a5a',color:inGroup?'#7aa8f0':inOtherGroup?'#1e3a5a':'#4a7aa8',cursor:inOtherGroup&&!inGroup?'not-allowed':'pointer'}}
                  >{inGroup?'✓ In Group':'Add'}</button>
                </div>
              );
            })}
          </div>
        ))}
        <button onClick={()=>saveGroups(setupRound.id)} style={{...S.pri,width:'100%',padding:'14px'}}>Save Groups</button>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',padding:'20px',maxWidth:480,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setView('home')} style={{...S.gho,padding:'6px 12px',fontSize:13}}>← Home</button>
          <div style={{fontSize:18,color:'#fbbf24'}}>🔐 Admin</div>
        </div>
      </div>

      {/* Admin tabs */}
      <div style={{display:'flex',gap:0,marginBottom:24,borderBottom:'2px solid #1a3050'}}>
        {[['competitions','🏆 Comps'],['players','👤 Players'],['courses','⛳ Courses'],['rounds','📋 Rounds']].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{fontFamily:'Georgia,serif',cursor:'pointer',fontSize:12,padding:'8px 12px',border:'none',borderBottom:tab===k?'2px solid #3b6fd4':'2px solid transparent',background:'transparent',color:tab===k?'#7aa8f0':'#2a4a7a',marginBottom:-2}}>
            {label}
          </button>
        ))}
      </div>

      {/* COMPETITIONS TAB */}
      {tab==='competitions'&&(
        <div>
          {competitions.map(comp=>(
            <div key={comp.id} style={{...S.card,marginBottom:10}}>
              <div style={{fontSize:15,color:'#e8f0ff',marginBottom:4}}>{comp.name}</div>
              <div style={{fontSize:12,color:'#4a7aa8',marginBottom:10}}>{comp.venue||'No venue'} · {comp.num_days} days</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {comp.status!=='active'&&<button onClick={()=>setCompStatus(comp.id,'active')} style={{...S.pri,padding:'6px 12px',fontSize:12}}>Set Active</button>}
                {comp.status!=='completed'&&<button onClick={()=>setCompStatus(comp.id,'completed')} style={{...S.gho,padding:'6px 12px',fontSize:12}}>Mark Done</button>}
                {comp.status==='active'&&<button onClick={()=>setCompStatus(comp.id,'setup')} style={{...S.gho,padding:'6px 12px',fontSize:12}}>Pause</button>}
              </div>
            </div>
          ))}
          {!addingComp?(
            <button onClick={()=>setAddingComp(true)} style={{...S.gho,width:'100%',marginTop:8}}>+ New Competition</button>
          ):(
            <div style={{...S.card,marginTop:8}}>
              <div style={{fontSize:14,color:'#7aa8f0',marginBottom:12}}>New Competition</div>
              {[['name','Name',newComp.name,v=>setNewComp(p=>({...p,name:v}))],['venue','Venue',newComp.venue,v=>setNewComp(p=>({...p,venue:v}))]].map(([k,label,val,fn])=>(
                <div key={k} style={{marginBottom:10}}>
                  <label style={S.lbl}>{label}</label>
                  <input value={val} onChange={e=>fn(e.target.value)} style={S.inp}/>
                </div>
              ))}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div>
                  <label style={S.lbl}>Days</label>
                  <input type="number" value={newComp.num_days} onChange={e=>setNewComp(p=>({...p,num_days:parseInt(e.target.value)||3}))} style={S.inp}/>
                </div>
                <div>
                  <label style={S.lbl}>Players</label>
                  <input type="number" value={newComp.num_players} onChange={e=>setNewComp(p=>({...p,num_players:parseInt(e.target.value)||8}))} style={S.inp}/>
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={addComp} style={{...S.pri,flex:1}}>Create</button>
                <button onClick={()=>setAddingComp(false)} style={{...S.gho,flex:1}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* PLAYERS TAB */}
      {tab==='players'&&(
        <div>
          {players.map(p=>(
            <div key={p.id} style={{...S.card,marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontSize:15,color:'#e8f0ff'}}>{p.name}</div>
                  <div style={{fontSize:11,color:p.team==='LIV'?'#7aa8f0':'#4a7aa8'}}>{p.team==='LIV'?'⚡ Team LIV':'😴 Team Boring'}</div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  {editHcp[p.id]!==undefined?(
                    <>
                      <input type="number" value={editHcp[p.id]} onChange={e=>setEditHcp(prev=>({...prev,[p.id]:e.target.value}))} style={{...S.inp,width:60,padding:'5px 8px',fontSize:13}}/>
                      <button onClick={()=>updateHandicap(p.id,editHcp[p.id])} style={{...S.pri,padding:'5px 10px',fontSize:12}}>Save</button>
                      <button onClick={()=>setEditHcp(prev=>({...prev,[p.id]:undefined}))} style={{...S.gho,padding:'5px 10px',fontSize:12}}>✕</button>
                    </>
                  ):(
                    <>
                      <div style={{textAlign:'center'}}>
                        <div style={{fontSize:16,color:'#7aa8f0'}}>{p.current_handicap||p.handicap||0}</div>
                        <div style={{fontSize:9,color:'#2a4a7a'}}>HCP</div>
                      </div>
                      <button onClick={()=>setEditHcp(prev=>({...prev,[p.id]:p.current_handicap||p.handicap||0}))} style={{...S.gho,padding:'5px 10px',fontSize:12}}>✏️</button>
                      <button onClick={()=>setCm({title:`Remove ${p.name}?`,body:'This will delete the player permanently.',action:'Remove',onConfirm:()=>deletePlayer(p.id)})} style={{...S.gho,padding:'5px 10px',fontSize:12,color:'#f87171',borderColor:'#5a2020'}}>✕</button>
                    </>
                  )}
                </div>
              </div>
            </div>
          ))}
          {!addingPlayer?(
            <button onClick={()=>setAddingPlayer(true)} style={{...S.gho,width:'100%',marginTop:8}}>+ Add Player</button>
          ):(
            <div style={{...S.card,marginTop:8}}>
              <div style={{fontSize:14,color:'#7aa8f0',marginBottom:12}}>Add Player</div>
              <div style={{marginBottom:10}}>
                <label style={S.lbl}>Name</label>
                <input value={newPlayer.name} onChange={e=>setNewPlayer(p=>({...p,name:e.target.value}))} style={S.inp}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                <div>
                  <label style={S.lbl}>Handicap</label>
                  <input type="number" value={newPlayer.handicap} onChange={e=>setNewPlayer(p=>({...p,handicap:e.target.value}))} style={S.inp}/>
                </div>
                <div>
                  <label style={S.lbl}>Team</label>
                  <select value={newPlayer.team} onChange={e=>setNewPlayer(p=>({...p,team:e.target.value}))} style={S.inp}>
                    <option value="LIV">Team LIV</option>
                    <option value="Boring">Team Boring</option>
                  </select>
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={addPlayer} style={{...S.pri,flex:1}}>Add</button>
                <button onClick={()=>{setAddingPlayer(false);setNewPlayer({name:'',handicap:'',team:'LIV'});}} style={{...S.gho,flex:1}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* COURSES TAB */}
      {tab==='courses'&&(
        <div>
          <div style={{fontSize:12,color:'#4a7aa8',marginBottom:12}}>Add courses and set par & stroke index for each hole. You only need to do this once per course.</div>
          {courses.map(course=>(
            <div key={course.id} style={{...S.card,marginBottom:10}}>
              <div style={{fontSize:15,color:'#e8f0ff',marginBottom:4}}>{course.name}</div>
              <div style={{fontSize:12,color:'#4a7aa8',marginBottom:10}}>{(course.holes||[]).length} holes configured</div>
              <CourseEditor course={course} S={S} sb={sb} load={load} flash={flash}/>
            </div>
          ))}
          {!addingCourse?(
            <button onClick={()=>setAddingCourse(true)} style={{...S.gho,width:'100%',marginTop:8}}>+ Add Course</button>
          ):(
            <div style={{...S.card,marginTop:8}}>
              <div style={{fontSize:14,color:'#7aa8f0',marginBottom:12}}>Add Course</div>
              <div style={{marginBottom:12}}>
                <label style={S.lbl}>Course Name</label>
                <input value={newCourse.name} onChange={e=>setNewCourse(p=>({...p,name:e.target.value}))} placeholder="e.g. Whitley Bay Golf Club" style={S.inp}/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={addCourse} style={{...S.pri,flex:1}}>Add Course</button>
                <button onClick={()=>setAddingCourse(false)} style={{...S.gho,flex:1}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ROUNDS TAB */}
      {tab==='rounds'&&(
        <div>
          {competitions.map(comp=>{
            const compRounds=rounds.filter(r=>r.competition_id===comp.id).sort((a,b)=>a.day_number-b.day_number);
            return(
              <div key={comp.id} style={{marginBottom:20}}>
                <div style={{fontSize:14,color:'#7aa8f0',marginBottom:10}}>{comp.name}</div>
                {compRounds.map(rd=>(
                  <div key={rd.id} style={{...S.card,marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
                      <div>
                        <div style={{fontSize:14,color:'#e8f0ff'}}>Day {rd.day_number} — {rd.name}</div>
                        <div style={{fontSize:11,color:'#4a7aa8'}}>{rd.course_name||'No course'} · {rd.status}</div>
                      </div>
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        <button onClick={()=>setupGroups(rd)} style={{...S.gho,padding:'5px 10px',fontSize:11}}>👥 Groups</button>
                        {rd.status!=='live'&&<button onClick={()=>setRoundStatus(rd.id,'live')} style={{...S.pri,padding:'5px 10px',fontSize:11,background:'rgba(239,68,68,0.2)',borderColor:'rgba(239,68,68,0.4)',color:'#fca5a5'}}>🔴 Go Live</button>}
                        {rd.status==='live'&&<button onClick={()=>setRoundStatus(rd.id,'completed')} style={{...S.gho,padding:'5px 10px',fontSize:11}}>✓ End</button>}
                      </div>
                    </div>
                  </div>
                ))}
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {Array.from({length:comp.num_days||3},(_,i)=>i+1).filter(d=>!compRounds.some(r=>r.day_number===d)).map(d=>(
                    <button key={d} onClick={()=>addRound(comp.id,d)} style={{...S.gho,padding:'6px 12px',fontSize:12}}>+ Day {d}</button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <ConfirmModal cm={cm} setCm={setCm}/>
    </div>
  );
}

// ── COURSE EDITOR ─────────────────────────────────────────────────
function CourseEditor({course,S,sb,load,flash}){
  const[expanded,setExpanded]=useState(false);
  const[holes,setHoles]=useState(course.holes||Array.from({length:18},(_,i)=>({hole:i+1,par:4,stroke_index:i+1})));
  const[saving,setSaving]=useState(false);

  async function save(){
    setSaving(true);
    await sb.from('cup_courses').update({holes}).eq('id',course.id);
    setSaving(false);load();flash('Course saved ✓');
  }

  if(!expanded) return(
    <button onClick={()=>setExpanded(true)} style={{...S.gho,fontSize:12,padding:'5px 12px'}}>✏️ Edit Holes</button>
  );

  return(
    <div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr>
              {['Hole','Par','SI'].map(h=><th key={h} style={{padding:'4px 6px',color:'#3b6fd4',textAlign:'center',fontFamily:'Georgia,serif',fontWeight:'normal'}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {holes.map((h,i)=>(
              <tr key={h.hole} style={{background:i%2===0?'rgba(255,255,255,0.02)':'transparent'}}>
                <td style={{padding:'4px 6px',textAlign:'center',color:'#7aa8f0'}}>{h.hole}</td>
                <td style={{padding:'3px'}}>
                  <input type="number" min="3" max="5" value={h.par} onChange={e=>{const n=[...holes];n[i]={...n[i],par:parseInt(e.target.value)||4};setHoles(n);}} style={{...S.inp,padding:'3px 4px',textAlign:'center',width:40,fontSize:12}}/>
                </td>
                <td style={{padding:'3px'}}>
                  <input type="number" min="1" max="18" value={h.stroke_index} onChange={e=>{const n=[...holes];n[i]={...n[i],stroke_index:parseInt(e.target.value)||i+1};setHoles(n);}} style={{...S.inp,padding:'3px 4px',textAlign:'center',width:40,fontSize:12}}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:8,marginTop:10}}>
        <button onClick={save} disabled={saving} style={{...S.pri,flex:1,padding:'8px',fontSize:13}}>{saving?'Saving…':'Save Course'}</button>
        <button onClick={()=>setExpanded(false)} style={{...S.gho,flex:1,padding:'8px',fontSize:13}}>Cancel</button>
      </div>
    </div>
  );
}

root.render(<App/>);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw-live.js').catch(()=>{});
  });
}
