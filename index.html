<!-- =========================================================

     ========================================================= -->
<!DOCTYPE html>
<html lang="en">

<!-- Core mobile/PWA metadata -->
<meta charset="UTF-8"/>

<!-- =========================================================
     GLOBAL STYLES
     Base reset, typography and page-level styling
     ========================================================= -->
<link rel="stylesheet" href="styles.css"/>
<style>
html,body,#root{margin:0;min-height:100%;background:#0a1528;color:#fff;overscroll-behavior-y:contain;}
body{-webkit-user-select:none;user-select:none;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
input,textarea,select{user-select:auto;-webkit-user-select:auto;}
.startup-shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(circle at 50% 20%,rgba(0,112,187,0.34),transparent 34%),linear-gradient(160deg,#0a1528 0%,#0d2040 44%,#0a1830 100%);text-align:center;padding:24px;box-sizing:border-box;}
.startup-shell img{width:min(168px,42vw);height:auto;display:block;filter:drop-shadow(0 10px 26px rgba(0,0,0,0.42));}
.startup-title{font-family:"Barlow Condensed",Inter,sans-serif;font-size:34px;font-weight:950;letter-spacing:0.16em;line-height:1;color:#fff;text-shadow:0 2px 0 rgba(3,12,28,0.82),0 8px 18px rgba(0,0,0,0.48),0 0 18px rgba(96,184,240,0.24),0 0 8px rgba(245,215,110,0.16);}
.startup-loading{font-size:12px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:#6cc6ff;}
</style>
</head>
<!-- =========================================================
     STATIC APP SHELL
     React mount point and error display container
     ========================================================= -->
<body>
<div id="root">
  <div class="startup-shell" aria-label="Loading Snyder Golf">
    <img src="snyder-golf-logo-clean.png" alt="Snyder Golf"/>
    <div class="startup-title">SNYDER GOLF</div>
    <div class="startup-loading">Loading</div>
  </div>
</div>
<div id="err" style="display:none;position:fixed;inset:0;background:#1a0a0a;color:#f87171;padding:16px;font-size:11px;font-family:monospace;overflow:auto;white-space:pre-wrap;z-index:9999;"></div>
<!-- =========================================================
     GLOBAL ERROR HANDLING
     Shows runtime errors on screen for easier mobile debugging
     ========================================================= -->
<script>
window.onerror=function(msg,src,line,col,err){
  var b=document.getElementById('err');
  b.style.display='block';
  b.textContent='ERROR: '+msg+'\nLine: '+line+'\n'+(err&&err.stack||'');
};
</script>
<!-- =========================================================
     APPLICATION SCRIPT (REACT / BABEL)
     ========================================================= -->
<!-- External runtime dependencies -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// Snyder Golf v4.08 League loader/root-cause fix
// The Money table bug was inside league-section.js, not app.js. Earlier fixes patched app/index
// after render, but the League script itself kept calculating/rendering the stale polluted balance.
// This loader fetches league-section.js as source, removes the bad Money balance overlay inside the
// Money data block, then compiles it once before loading app.js.
(function(){
  'use strict';
  var errBox=function(message){
    var b=document.getElementById('err');
    if(b){b.style.display='block';b.textContent=message;}
  };
  function fixLeagueMoneySource(src){
    src=String(src||'').replace(/^\uFEFF/, '');
    var start=src.indexOf('const moneyData=players.map(p=>{');
    var end=start>=0?src.indexOf('const totalPaid=',start):-1;
    if(start>=0&&end>start){
      var block=src.slice(start,end);
      // Force the root calculation to be display-simple only:
      // paid from payments table, owed from entry + extra rounds + confirmed snakes, balance = paid - owed.
      block=block.replace(/const paid\s*=\s*[^;]*;/, "const paid=Number((payments[p.id]?.paid)||0)||0;");
      block=block.replace(/const owed\s*=\s*[^;]*;/, "const owed=calcOwed(p.id);");
      block=block.replace(/const balance\s*=\s*[^;]*;/, "const balance=paid-owed;");
      src=src.slice(0,start)+block+src.slice(end);
    }
    // Remove older DOM/adjustment hooks if any accidentally got inserted into league-section.js.
    src=src.replace(/window\.snyderReloadSweepstakeBalanceAdjustments\s*&&\s*window\.snyderReloadSweepstakeBalanceAdjustments\([^;]*;?/g,'');
    return src;
  }
  function loadApp(){
    var s=document.createElement('script');
    s.type='text/babel';
    s.src='app.js?v=4.08';
    document.body.appendChild(s);
  }
  fetch('./league-section.js?v=4.08-root-money-fix',{cache:'no-store'})
    .then(function(res){
      if(!res.ok)throw new Error('Could not load league-section.js: '+res.status);
      return res.text();
    })
    .then(function(src){
      var fixed=fixLeagueMoneySource(src);
      var compiled=Babel.transform(fixed,{presets:['react']}).code;
      (0,eval)(compiled);
      window.__SNYDER_LEAGUE_MONEY_SOURCE_FIXED='v4.08';
      loadApp();
    })
    .catch(function(e){
      console.error(e);
      errBox('ERROR: League section failed to load/fix\n'+(e&&e.stack||e));
    });
})();
</script>

</body>
</html>
