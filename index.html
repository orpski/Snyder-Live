<!-- SNYDER LIVE v1.24 -->
<!-- =========================================================
     DOCUMENT SETUP
     ========================================================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<!-- Core mobile/PWA metadata -->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Snyder Live</title>
<!-- External runtime dependencies -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- App font loading -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet"/>
<!-- =========================================================
     GLOBAL STYLES
     Base reset, typography and page-level styling
     ========================================================= -->
<link rel="stylesheet" href="styles.css"/>
<style>html,body,#root{overscroll-behavior-y:contain;} body{-webkit-user-select:none;user-select:none;} input,textarea,select{user-select:auto;-webkit-user-select:auto;}</style>

</head>
<!-- =========================================================
     STATIC APP SHELL
     Version badge, React mount point and error display container
     ========================================================= -->
<body>
<div id="version" style="position:fixed;top:0;right:0;background:red;color:white;font-size:10px;padding:2px 6px;z-index:99999">v1.24</div>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#1a0a0a;color:#f87171;padding:16px;font-size:11px;font-family:monospace;overflow:auto;white-space:pre-wrap;z-index:9999;"></div>
<!-- =========================================================
     GLOBAL ERROR HANDLING
     Shows runtime errors on screen for easier mobile debugging
     ========================================================= -->
<script>
window.onerror=function(msg,src,line,col,err){
  var b=document.getElementById('err');
  b.style.display='block';
  b.textContent='ERROR: '+msg+'\nLine: '+line+'\n'+(err&&err.stack||'');
};
</script>
<!-- =========================================================
     APPLICATION SCRIPT (REACT / BABEL)
     ========================================================= -->
<script type="text/babel" src="app.js"></script>

</body>
</html>
